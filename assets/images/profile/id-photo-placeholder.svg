<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-labelledby="title desc">
  <title id="title">ID Photo Placeholder</title>
  <desc id="desc">Placeholder for personal ID photo.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f1a28" />
      <stop offset="100%" stop-color="#060b13" />
    </linearGradient>
    <linearGradient id="shine" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#8ec6ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#2d72ff" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)" />
  <rect x="48" y="48" width="704" height="904" rx="28" fill="none" stroke="#2f4c6d" stroke-width="4" />
  <rect x="72" y="72" width="656" height="856" rx="20" fill="url(#shine)" />
  <circle cx="400" cy="380" r="136" fill="#8ec6ff" fill-opacity="0.14" />
  <rect x="240" y="560" width="320" height="220" rx="96" fill="#8ec6ff" fill-opacity="0.12" />
  <text x="400" y="870" text-anchor="middle" fill="#d9e8ff" font-family="Noto Sans SC, Microsoft YaHei, sans-serif" font-size="48">ID PHOTO</text>
  <text x="400" y="925" text-anchor="middle" fill="#8fa4bf" font-family="Noto Sans SC, Microsoft YaHei, sans-serif" font-size="24">将照片命名为 ID-Photo.jpg 并放入 profile 目录</text>
</svg>