  <path d="M744 324h112c22.091 0 40 17.909 40 40v0c0 22.091-17.909 40-40 40H744c-22.091 0-40-17.909-40-40v0c0-22.091 17.909-40 40-40z" fill="#58a6ff" fill-opacity="0.2" />
